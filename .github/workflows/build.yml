name: runclub ci

on:
 push:
  branches: [main]
 pull_request:
  branches: [main]

jobs:
 build-and-test:
  runs-on: ubuntu-latest 

  steps:
   - name: Checkout Code
     uses: actions/checkout@v4

   - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
       node-version: '24'
       cache: 'yarn'

   - name: Install Dependency
     run: yarn install

   - name: Build Typescript Application
     run: yarn build

