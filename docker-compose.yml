version: '3.8'

services:
app:
build: .
ports: 
- "3000:3000"
environment:
- DB_USER=Run-club
- DB_NAME=Runclub
- DB_PASS=runfor
- DB_HOST=mysql
- DB_PORT=3306

depends_on:
- mysql

mysql:

image: mysql:8.0
ports: - "3306:3306"
environment: 
- DB_USER=Run-club
- DB_NAME=Runclub
- DB_PASS=runfor
- DB_HOST=mysql
- DB_PORT=3306

volumes:
- mysql_data:/var/lib/mysql

volumes:
mysql_data